name: Daily Cron Trigger

on:
  schedule:
    - cron: "0 2 * * *"     # runs every day at 5:00 UTC = midnight EST
  workflow_dispatch:         # lets you run manually

jobs:
  trigger-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Call backend
        run: |
          curl -X GET "https://boilerboard.onrender.com/cron"
